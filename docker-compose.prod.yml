# =============================================================================
# pgstat Production Compose — External PostgreSQL kullanır
# DB Docker'da değil, kendi kurduğunuz PG'ye bağlanır
#
# Kullanım:
#   cp .env.example .env   # düzenle
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  # =========================================================================
  # Java Spring Boot Collector (daemon)
  # =========================================================================
  collector:
    build: ./collector
    container_name: pgstat-collector
    environment:
      PGSTAT_DB_HOST: ${PGSTAT_DB_HOST}
      PGSTAT_DB_PORT: ${PGSTAT_DB_PORT}
      PGSTAT_DB_NAME: ${PGSTAT_DB_NAME}
      PGSTAT_DB_USER: ${PGSTAT_DB_USER}
      PGSTAT_DB_PASSWORD: ${PGSTAT_DB_PASSWORD}
      PGSTAT_SECRET_KEY: ${PGSTAT_SECRET_KEY}
      SPRING_PROFILES_ACTIVE: docker
      HOSTNAME: ${COLLECTOR_HOSTNAME:-collector-01}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pgstat-secrets:/app/data/secrets
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =========================================================================
  # Node.js Express API — port 3001
  # =========================================================================
  api:
    build: ./api
    container_name: pgstat-api
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      PGSTAT_DB_HOST: ${PGSTAT_DB_HOST}
      PGSTAT_DB_PORT: ${PGSTAT_DB_PORT}
      PGSTAT_DB_NAME: ${PGSTAT_DB_NAME}
      PGSTAT_DB_USER: ${PGSTAT_DB_USER}
      PGSTAT_DB_PASSWORD: ${PGSTAT_DB_PASSWORD}
      PGSTAT_SECRET_KEY: ${PGSTAT_SECRET_KEY}
      PGSTAT_JWT_SECRET: ${PGSTAT_JWT_SECRET}
      PGSTAT_JWT_REFRESH_SECRET: ${PGSTAT_JWT_REFRESH_SECRET}
      PGSTAT_ADMIN_PASSWORD: ${PGSTAT_ADMIN_PASSWORD}
      PGSTAT_SECRETS_DIR: /app/data/secrets
      PORT: 3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pgstat-secrets:/app/data/secrets
      - ./VERSION:/app/VERSION:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # =========================================================================
  # React UI (nginx) — port 3000
  # =========================================================================
  ui:
    build: ./ui
    container_name: pgstat-ui
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Grafana — pgstat UI ile aynı port üzerinden (UI nginx /grafana/ proxy)
  # Sadece internal network'te calisir, host port expose etmez
  # =========================================================================
  grafana:
    image: grafana/grafana:11.2.0
    container_name: pgstat-grafana
    environment:
      # Sub-path mount ayarlari — /grafana prefix'inde calisacak
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Iframe embed — pgstat UI ileride iframe ile panel gomerse calissin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      # Anonymous viewer — sirketici ag, single-admin sistem
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Admin sifresi — .env'den
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-pgstat-admin}
      # Read-only DB ile data source provisioning
      PGSTAT_DB_HOST: ${PGSTAT_DB_HOST}
      PGSTAT_DB_PORT: ${PGSTAT_DB_PORT}
      PGSTAT_DB_NAME: ${PGSTAT_DB_NAME}
      PGSTAT_GRAFANA_DB_USER: ${PGSTAT_GRAFANA_DB_USER:-pgstat_grafana_ro}
      PGSTAT_GRAFANA_DB_PASSWORD: ${PGSTAT_GRAFANA_DB_PASSWORD:-grafana-ro}
      # Plugin ihtiyaci olursa ileride
      GF_INSTALL_PLUGINS: ""
      # Grafana Live (WebSocket) — 0 = devre disi
      # Reverse proxy arkasinda WS bazi kurulumlarda sorun cikariyor;
      # dashboard'lari etkilemez, sadece "live notifications" devre disi olur
      GF_LIVE_MAX_CONNECTIONS: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgstat-secrets:
  grafana-data:
