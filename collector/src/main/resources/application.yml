# =============================================================================
# pgstat-collector yapılandırması
# =============================================================================

spring:
  application:
    name: pgstat-collector

  # Central DB bağlantısı (HikariCP)
  datasource:
    url: jdbc:postgresql://${PGSTAT_DB_HOST:localhost}:${PGSTAT_DB_PORT:5417}/${PGSTAT_DB_NAME:pgstat}
    username: ${PGSTAT_DB_USER:samet}
    password: ${PGSTAT_DB_PASSWORD:samet}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  # Scheduling aktif
  task:
    scheduling:
      pool:
        size: 4

  # Email (SMTP) ayarları — bildirim kanalı olarak kullanılır
  mail:
    host: ${PGSTAT_SMTP_HOST:localhost}
    port: ${PGSTAT_SMTP_PORT:587}
    username: ${PGSTAT_SMTP_USER:}
    password: ${PGSTAT_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${PGSTAT_SMTP_AUTH:false}
          starttls:
            enable: ${PGSTAT_SMTP_STARTTLS:false}

# Collector özel ayarları
pgstat:
  worker:
    # Bu collector instance'ının hostname'i (job_run tablosuna yazılır)
    hostname: ${HOSTNAME:collector-01}
    # Scheduler poll aralığı (ms) — her 5 saniyede DB'den due instance kontrol eder
    poll-interval-ms: 5000
