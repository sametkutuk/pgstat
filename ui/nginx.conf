server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — tüm route'ları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API isteklerini backend'e proxy'le
    # Docker DNS resolver ile container adı çözümlenir
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://pgstat-api:3001;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Grafana — sub-path mount, ayni port uzerinden
    # ÖNEMLI: Grafana GF_SERVER_SERVE_FROM_SUB_PATH=true ile calisiyor, yani
    # /grafana prefix'ini KENDISI bekliyor. Bu yuzden nginx prefix'i KALDIRMAZ
    # (rewrite/trailing slash YOK). Aksi takdirde redirect loop olur.
    location /grafana/ {
        resolver 127.0.0.11 valid=10s;
        set $grafana_upstream http://pgstat-grafana:3000;
        proxy_pass $grafana_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Grafana Live (WebSocket) — anlik panel guncellemeleri icin
    location /grafana/api/live/ {
        resolver 127.0.0.11 valid=10s;
        set $grafana_upstream http://pgstat-grafana:3000;
        proxy_pass $grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
